<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3d-framework WASM teapot</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f4f1;
      color: #1d2521;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px clamp(16px, 3vw, 40px);
      border-bottom: 1px solid #cfd8d0;
      background: #fbfcf8;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2vw, 1.6rem);
      font-weight: 720;
      letter-spacing: 0;
    }

    .status {
      min-width: 9rem;
      text-align: right;
      font-size: 0.9rem;
      color: #4c5c53;
    }

    main {
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 48px);
    }

    canvas {
      width: min(82vmin, 800px);
      height: min(82vmin, 800px);
      image-rendering: pixelated;
      background: white;
      border: 1px solid #aebcaf;
      box-shadow: 0 20px 50px rgb(41 52 45 / 18%);
    }
  </style>
</head>
<body>
  <header>
    <h1>3d-framework WASM teapot</h1>
    <div class="status" id="status">Loading...</div>
  </header>
  <main>
    <canvas id="viewport" width="800" height="800"></canvas>
  </main>
  <script>
    var Module = {
      onRuntimeInitialized() {
        const status = document.getElementById("status");
        const canvas = document.getElementById("viewport");
        const context = canvas.getContext("2d");
        const init = Module.cwrap("raster_init", null, []);
        const frame = Module.cwrap("raster_frame", null, ["number"]);
        const width = Module.cwrap("raster_width", "number", []);
        const height = Module.cwrap("raster_height", "number", []);
        const pixels = Module.cwrap("raster_pixels", "number", []);

        init();
        canvas.width = width();
        canvas.height = height();
        let previous = performance.now();

        function tick(now) {
          frame((now - previous) / 1000);
          previous = now;
          const rgba = new Uint8ClampedArray(Module.HEAPU8.buffer, pixels(), canvas.width * canvas.height * 4);
          context.putImageData(new ImageData(rgba, canvas.width, canvas.height), 0, 0);
          status.textContent = "Running";
          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      }
    };
  </script>
  <script src="rasterizer.js"></script>
</body>
</html>
